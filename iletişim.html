<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Ahsen Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">AHSEN <span>CAFE</span></div>
            <ul>
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="hakkımızda.html">Hakkımızda</a></li>
                <li><a href="iletişim.html">İletişim</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="iletisim-container">
            <h2>Bize Ulaşın</h2>
            <form class="pro-form" id="contact-form" novalidate>
                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" placeholder="ornek@mail.com">
                    <span id="email-error" class="error-text hidden">Lütfen geçerli bir e-posta girin.</span>
                </div>
                <div class="form-group">
                    <label for="mesaj">Mesaj</label>
                    <textarea id="mesaj" rows="5" placeholder="Nasıl yardımcı olabiliriz?"></textarea>
                    <span id="mesaj-error" class="error-text hidden">Lütfen bir mesaj yazın.</span>
                </div>
                <button type="submit" class="submit-btn">Mesajı Gönder</button>
            </form>

            <div id="basari-mesaji" class="hidden">
                <h3>Mesajınız Alındı! ☕</h3>
                <p>En kısa sürede size dönüş yapacağız.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
